name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    env:
      BUNDLE_WITHOUT: ''

    steps:
      - uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop

      - name: ErbLint
        run: bundle exec erblint --lint-all

      - name: Brakeman
        run: bundle exec brakeman --no-pager

  test-sqlite:
    name: Test (SQLite)
    runs-on: ubuntu-latest

    env:
      BUNDLE_WITHOUT: 'development'
      RAILS_ENV: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache yarn
        uses: actions/cache@v5
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Build JS
        run: yarn build

      - name: Build CSS
        run: yarn build:css

      - name: Setup database
        run: bin/rails db:setup

      - name: Run tests
        run: bin/rails test

  test-postgres:
    name: Test (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pwpush
          POSTGRES_PASSWORD: pwpush_test
          POSTGRES_DB: pwpush_test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BUNDLE_WITHOUT: 'development'
      RAILS_ENV: test
      DATABASE_URL: postgres://pwpush:pwpush_test@localhost:5432/pwpush_test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache yarn
        uses: actions/cache@v5
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Build JS
        run: yarn build

      - name: Build CSS
        run: yarn build:css

      - name: Setup database
        run: bin/rails db:setup

      - name: Run tests
        run: bin/rails test
